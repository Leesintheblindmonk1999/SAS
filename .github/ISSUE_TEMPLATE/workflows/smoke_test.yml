name: SAS API Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Runs every 6 hours to monitor production availability
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions tab

jobs:
  smoke-test:
    name: Production API Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check /health endpoint
        run: |
          echo "Testing https://sas-api.onrender.com/health ..."
          response=$(curl --silent --write-out "\n%{http_code}" \
            --max-time 30 \
            https://sas-api.onrender.com/health)

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n-1)

          echo "Status: $http_code"
          echo "Body: $body"

          if [ "$http_code" != "200" ]; then
            echo "FAIL: /health returned $http_code (expected 200)"
            exit 1
          fi

          echo "PASS: /health is up"

      - name: Check /v1/diff endpoint
        run: |
          echo "Testing https://sas-api.onrender.com/v1/diff ..."
          response=$(curl --silent --write-out "\n%{http_code}" \
            --max-time 30 \
            -X POST https://sas-api.onrender.com/v1/diff \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${{ secrets.SAS_SMOKE_API_KEY }}" \
            -d '{
              "text_a": "The Earth orbits the Sun.",
              "text_b": "The Earth does not orbit the Sun.",
              "experimental": false
            }')

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n-1)

          echo "Status: $http_code"
          echo "Body: $body"

          if [ "$http_code" != "200" ]; then
            echo "FAIL: /v1/diff returned $http_code (expected 200)"
            exit 1
          fi

          # Verify verdict is present in response
          if echo "$body" | grep -q '"verdict"'; then
            echo "PASS: /v1/diff responded with verdict"
          else
            echo "FAIL: /v1/diff response missing 'verdict' field"
            exit 1
          fi

          # Verify ISI is present
          if echo "$body" | grep -q '"isi"'; then
            echo "PASS: /v1/diff responded with ISI"
          else
            echo "FAIL: /v1/diff response missing 'isi' field"
            exit 1
          fi

      - name: Summary
        if: success()
        run: |
          echo "✓ SAS API is operational"
          echo "✓ /health → 200 OK"
          echo "✓ /v1/diff → 200 OK with verdict and ISI"
