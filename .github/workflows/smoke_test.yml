name: SAS API Smoke Test

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - ".github/workflows/**"
      - "requirements.txt"

jobs:
  smoke-test:
    name: Production API Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      SAS_BASE_URL: https://sas-api.onrender.com
      SAS_API_KEY: ${{ secrets.SAS_SMOKE_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show target
        run: |
          echo "Testing SAS API at: $SAS_BASE_URL"

      - name: Wait for API to wake up
        run: |
          set -e

          echo "Waking up API..."
          for i in $(seq 1 12); do
            code=$(curl -sS -o /tmp/health.json -w "%{http_code}" "$SAS_BASE_URL/health" || true)

            echo "Attempt $i -> HTTP $code"

            if [ "$code" = "200" ]; then
              cat /tmp/health.json
              echo ""
              echo "API is awake."
              exit 0
            fi

            sleep 10
          done

          echo "API did not become healthy in time."
          cat /tmp/health.json || true
          exit 1

      - name: Check /health
        run: |
          set -e

          response=$(curl -sS "$SAS_BASE_URL/health")
          echo "$response" | jq .

          status=$(echo "$response" | jq -r '.status')
          kappa=$(echo "$response" | jq -r '.kappa_d')

          test "$status" = "ok"
          test "$kappa" != "null"

      - name: Check /readyz
        run: |
          set -e

          response=$(curl -sS "$SAS_BASE_URL/readyz")
          echo "$response" | jq .

          status=$(echo "$response" | jq -r '.status')
          test "$status" = "ready"

          echo "$response" | jq -e '.routers.public_demo == true'
          echo "$response" | jq -e '.routers.public_request_key == true'
          echo "$response" | jq -e '.routers.whoami == true'
          echo "$response" | jq -e '.routers.billing == true'
          echo "$response" | jq -e '.routers.diff == true'
          echo "$response" | jq -e '.routers.audit == true'

      - name: Check public stats
        run: |
          set -e

          response=$(curl -sS "$SAS_BASE_URL/public/stats")
          echo "$response" | jq .

          status=$(echo "$response" | jq -r '.status')
          test "$status" = "ok"

          echo "$response" | jq -e '.privacy.raw_ips_exposed == false'
          echo "$response" | jq -e '.privacy.api_keys_exposed == false'

      - name: Check public activity
        run: |
          set -e

          response=$(curl -sS "$SAS_BASE_URL/public/activity?limit=5")
          echo "$response" | jq .

          status=$(echo "$response" | jq -r '.status')
          test "$status" = "ok"

      - name: Check public demo endpoint
        run: |
          set -e

          payload='{
            "source": "The Eiffel Tower is located in Paris, France, and was built in 1889.",
            "response": "The Eiffel Tower is located in Berlin, Germany, and was built in 1950."
          }'

          response=$(curl -sS -X POST "$SAS_BASE_URL/public/demo/audit" \
            -H "Content-Type: application/json" \
            -d "$payload")

          echo "$response" | jq .

          status=$(echo "$response" | jq -r '.status')
          isi=$(echo "$response" | jq -r '.isi')
          verdict=$(echo "$response" | jq -r '.verdict')

          test "$status" = "ok"
          test "$isi" != "null"
          test "$verdict" != "null"

      - name: Check protected /v1/whoami
        if: env.SAS_API_KEY != ''
        run: |
          set -e

          response=$(curl -sS "$SAS_BASE_URL/v1/whoami" \
            -H "X-API-Key: $SAS_API_KEY")

          echo "$response" | jq .

          status=$(echo "$response" | jq -r '.status')
          active=$(echo "$response" | jq -r '.active')
          plan=$(echo "$response" | jq -r '.plan')

          test "$status" = "ok"
          test "$active" = "true"
          test "$plan" != "null"

      - name: Check protected /v1/diff
        if: env.SAS_API_KEY != ''
        run: |
          set -e

          payload='{
            "text_a": "The Eiffel Tower is located in Paris, France, and was built in 1889.",
            "text_b": "The Eiffel Tower is located in Berlin, Germany, and was built in 1950.",
            "experimental": true
          }'

          response=$(curl -sS -X POST "$SAS_BASE_URL/v1/diff" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: $SAS_API_KEY" \
            -d "$payload")

          echo "$response" | jq .

          isi=$(echo "$response" | jq -r '.isi')
          verdict=$(echo "$response" | jq -r '.verdict')

          test "$isi" != "null"
          test "$verdict" != "null"

      - name: Warn if SAS_API_KEY is missing
        if: env.SAS_API_KEY == ''
        run: |
          echo "::warning::SAS_API_KEY secret is missing. Protected endpoint checks were skipped."
