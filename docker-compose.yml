version: "3.9"

services:

  # ── Omni-Scanner API ────────────────────────────────────────────────────────
  api:
    build:
      context: .                               # omni-scanner-api/ (current dir)
      dockerfile: docker/Dockerfile
    image: omni-scanner-api:1.1.0
    container_name: omni-scanner-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      OLLAMA_HOST: "http://ollama:11434"
    volumes:
      # SQLite databases persisted in data/ folder
      - ./data/auth.db:/app/app/auth.db
      - ./data/rate_limit.db:/app/app/rate_limit.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    # depends_on:
    #   ollama:
    #     condition: service_healthy

